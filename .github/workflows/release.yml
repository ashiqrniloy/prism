name: release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: "verify (SDK readiness: typecheck, test, pack dry-run)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      # sdk:ready runs typecheck, network-free tests, and pack dry-run.
      # npm test budget is < 60s; sdk:ready can exceed it because it adds typecheck + pack.
      # Timeout is a hang backstop, not the performance budget.
      # Node 24: docs.test.ts runs examples/*.ts via native type stripping (Node < 22.6 can't).
      - name: verify SDK readiness
        run: |
          set -o pipefail
          npm run sdk:ready 2>&1 | tee sdk-ready.log
        timeout-minutes: 5
      - name: summarize SDK failure
        if: failure()
        run: tail -200 sdk-ready.log >> "$GITHUB_STEP_SUMMARY"

  node20-compat:
    name: node20 compat (build + public import smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # Node 20 engine support: avoid docs examples, which need Node >=22.6 native TS stripping.
      - run: |
          npm run build
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";
          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          for (const target of Object.values(pkg.exports).map((entry) => entry.default)) {
            await import(new URL(target, import.meta.url));
          }
          NODE
        timeout-minutes: 3

  # Plan 056 Task 7: live PostgreSQL adapter matrix stays out of the default
  # network-free suite and runs only against an explicit CI Postgres service.
  postgres-integration:
    name: postgres integration (session-store + memory adapters)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: prism
          POSTGRES_PASSWORD: prism
          POSTGRES_DB: prism
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prism -d prism"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: run postgres live adapter suite
        env:
          PRISM_TEST_POSTGRES_URL: postgres://prism:prism@localhost:5432/prism
        run: npm run test:postgres
        timeout-minutes: 5

  publish:
    name: publish (deterministic, resumable, provenance)
    needs: [verify, node20-compat, postgres-integration]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - name: pack release artifacts and checksums
        run: |
          mkdir -p release-artifacts
          npm pack --json --pack-destination release-artifacts > release-artifacts/core-pack.json
          npm pack --workspaces --json --pack-destination release-artifacts > release-artifacts/workspace-pack.json
          sha256sum release-artifacts/*.tgz > release-artifacts/SHA256SUMS
      - name: retain release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-artifacts-${{ github.ref_name }}
          path: release-artifacts
          retention-days: 30
      - name: publish in dependency order
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run release:publish -- --version "${GITHUB_REF_NAME#v}" --resume --report release-artifacts/publish-report.json
      - name: retain publish report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: publish-report-${{ github.ref_name }}
          path: release-artifacts/publish-report.json
          if-no-files-found: warn
          retention-days: 30
