name: release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: "verify (SDK readiness: typecheck, test, pack dry-run)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: verify SDK readiness
        run: |
          set -o pipefail
          npm run sdk:ready 2>&1 | tee sdk-ready.log
        timeout-minutes: 5
      - name: summarize SDK failure
        if: failure()
        run: tail -200 sdk-ready.log >> "$GITHUB_STEP_SUMMARY"

  node20-compat:
    name: node20 compat (build + public import smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: |
          npm run build
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";
          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          for (const target of Object.values(pkg.exports).map((entry) => entry.default)) {
            await import(new URL(target, import.meta.url));
          }
          NODE
        timeout-minutes: 3

  postgres-integration:
    name: postgres integration (session-store + memory adapters)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: prism
          POSTGRES_PASSWORD: prism
          POSTGRES_DB: prism
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prism -d prism"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: run postgres live adapter suite
        env:
          PRISM_TEST_POSTGRES_URL: postgres://prism:prism@localhost:5432/prism
        run: npm run test:postgres
        timeout-minutes: 5

  codeql-release:
    name: CodeQL release SAST
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: javascript-typescript
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml
      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1

  supply-chain:
    name: supply chain (audit, SPDX, licenses, source secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: |
          mkdir -p security-artifacts
          npm sbom --sbom-format spdx > security-artifacts/sbom.spdx.json
          node scripts/verify-sbom.mjs security-artifacts/sbom.spdx.json security/license-policy.json
          git ls-files -z | xargs -0 node scripts/scan-secrets.mjs

  publish:
    name: publish (deterministic, resumable, provenance)
    needs: [verify, node20-compat, postgres-integration, codeql-release, supply-chain]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - name: pack release artifacts, checksums, SBOM, and secret scan
        run: |
          mkdir -p release-artifacts
          npm pack --json --pack-destination release-artifacts > release-artifacts/core-pack.json
          npm pack --workspaces --json --pack-destination release-artifacts > release-artifacts/workspace-pack.json
          sha256sum release-artifacts/*.tgz > release-artifacts/SHA256SUMS
          npm sbom --sbom-format spdx > release-artifacts/sbom.spdx.json
          node scripts/verify-sbom.mjs release-artifacts/sbom.spdx.json security/license-policy.json
          test "$(du -sb release-artifacts | cut -f1)" -le 134217728
          mkdir -p release-artifacts/unpacked
          for archive in release-artifacts/*.tgz; do
            dir="release-artifacts/unpacked/$(basename "$archive" .tgz)"
            mkdir -p "$dir"
            tar -xzf "$archive" -C "$dir"
          done
          node scripts/scan-secrets.mjs release-artifacts/unpacked
          rm -rf release-artifacts/unpacked
      - name: attest package artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release-artifacts/*.tgz
      - name: attest SBOM artifact
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release-artifacts/sbom.spdx.json
      - name: retain release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts-${{ github.ref_name }}
          path: release-artifacts
          retention-days: 30
      - name: publish in dependency order
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run release:publish -- --version "${GITHUB_REF_NAME#v}" --resume --report release-artifacts/publish-report.json
      - name: retain publish report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: publish-report-${{ github.ref_name }}
          path: release-artifacts/publish-report.json
          if-no-files-found: warn
          retention-days: 30
