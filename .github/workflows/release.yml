name: release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

jobs:
  verify:
    name: "verify (SDK readiness: typecheck, test, pack dry-run)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      # sdk:ready runs typecheck, network-free tests, and pack dry-run.
      # npm test budget is < 60s; sdk:ready can exceed it because it adds typecheck + pack.
      # Timeout is a hang backstop, not the performance budget.
      # Node 24: docs.test.ts runs examples/*.ts via native type stripping (Node < 22.6 can't).
      - run: npm run sdk:ready
        timeout-minutes: 5

  node20-compat:
    name: node20 compat (build + public import smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # Node 20 engine support: avoid docs examples, which need Node >=22.6 native TS stripping.
      - run: |
          npm run build
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";
          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          for (const target of Object.values(pkg.exports).map((entry) => entry.default)) {
            await import(new URL(target, import.meta.url));
          }
          NODE
        timeout-minutes: 3

  publish:
    name: publish (dry-run unless NPM_TOKEN is set)
    needs: [verify, node20-compat]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - name: publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            # Core first: first-party packages declare @arnilo/prism as a required peer,
            # so it must exist on the registry for consumers.
            npm publish --access public
            npm publish --workspaces --access public
          else
            echo "NPM_TOKEN not set; running publish dry-run"
            npm publish --dry-run --access public
            npm publish --workspaces --dry-run --access public
          fi
